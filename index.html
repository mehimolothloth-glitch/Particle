<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover, user-scalable=no">
  <title></title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <canvas id="particleCanvas"></canvas>
  <div class="control-panel">
    <button id="clearBtn" title="Hapus semua partikel">⚰️</button>
    <button id="toggleModeBtn" title="Ganti mode interaksi">🎨</button>
    <div class="info-badge">
      <span id="particleCount">0</span>
    </div>
    <div class="mode-indicator" id="modeText">Gambar</div>
  </div>
  <div id="toastMsg" class="toast-msg">Sentuh untuk menggambar</div>
  <script src="script.js"></script>
</body>
</html>
